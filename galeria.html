        <span></span>
        <span></span>
        <span></span>

    </div>

  <!-- Main Content -->
  <main class="gallery-main">
    <!-- Chapter 01 -->
    <section class="gallery-chapter" id="chapter01" aria-labelledby="chapter01-title">
      <div class="chapter-header">
        <h2 id="chapter01-title" class="chapter-number" data-pt="CAPÍTULO 01" data-en="CHAPTER 01">CAPÍTULO 01</h2>
        <h3 class="chapter-subtitle" data-pt="Mundo Conectado / Decadente" data-en="Connected World / Decadent">Mundo Conectado / Decadente</h3>

      <div class="gallery-grid" id="gallery-chapter01">

    </section>

    <section class="gallery-chapter" id="chapter02" aria-labelledby="chapter02-title">
      <div class="chapter-header">

  <!-- Lightbox -->
  <dialog class="lightbox" id="lightbox" aria-label="Visualizador de fotos" role="dialog" aria-modal="true">
    <div class="lightbox-content">
      <button class="lightbox-close" aria-label="Fechar visualizador">&times;</button>
      
      <div class="lightbox-image-container">
        <img id="lightbox-image" src="" alt="" class="lightbox-image">
      </div>
      
      <button class="lightbox-prev" aria-label="Foto anterior">&#10094;</button>
      <button class="lightbox-next" aria-label="Próxima foto">&#10095;</button>
      
      <div class="lightbox-counter">
        <span id="lightbox-current">1</span> / <span id="lightbox-total">1</span>
      </div>
    </div>
  </dialog>
